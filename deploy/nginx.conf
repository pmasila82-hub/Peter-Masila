# =========================================================================
# CELCOM ERP PRO - PRODUCTION NGINX CONFIGURATION
# Optimized for Ubuntu Server 24.04, High Concurrency, and Extreme Security
# =========================================================================

user nginx;
worker_processes auto;
pid /var/run/nginx.pid;

# Load dynamic modules if necessary
# include /usr/share/nginx/modules/*.conf;

events {
    worker_connections 2048;
    multi_accept on;
    use epoll;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Logging Formats with Upstream Latency and Response Metrics
    log_format production_json escape=json '{'
        '"time_local":"$time_local",'
        '"remote_addr":"$remote_addr",'
        '"request":"$request",'
        '"status": "$status",'
        '"body_bytes_sent":"$body_bytes_sent",'
        '"request_time":"$request_time",'
        '"upstream_response_time":"$upstream_response_time",'
        '"http_referrer":"$http_referrer",'
        '"http_user_agent":"$http_user_agent",'
        '"http_x_forwarded_for":"$http_x_forwarded_for"'
    '}';

    access_log /var/log/nginx/access.log production_json;
    error_log /var/log/nginx/error.log warn;

    # Basic Optimization Limits
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    keepalive_requests 1000;
    types_hash_max_size 2048;
    server_tokens off; # Mask version signature

    client_max_body_size 25M; # Support bulk document and inventory sheets uploads
    client_body_buffer_size 128k;

    # Gzip Compression Tuning
    gzip on;
    gzip_disable "msie6";
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_buffers 16 8k;
    gzip_http_version 1.1;
    gzip_min_length 256;
    gzip_types
        application/atom+xml
        application/javascript
        application/json
        application/ld+json
        application/manifest+json
        application/rss+xml
        application/vnd.geo+json
        application/vnd.ms-fontobject
        application/x-font-ttf
        application/x-web-app-manifest+json
        application/xhtml+xml
        application/xml
        font/opentype
        image/bmp
        image/svg+xml
        image/x-icon
        text/cache-manifest
        text/css
        text/plain
        text/vcard
        text/vnd.rim.location.code
        text/vtt
        text/x-component
        text/x-cross-domain-policy;

    # Rate Limiting Zones (10 requests/second with burst support on sensitive login paths)
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=global_limit:10m rate=100r/s;

    # Upstream Backend Pool
    upstream celcom_erp_backend {
        server 127.0.0.1:3000 keepalive 32;
    }

    # =========================================================================
    # HTTP REDIRECT GATEWAY (Enforce SSL)
    # =========================================================================
    server {
        listen 80;
        listen [::]:80;
        server_name erp.celcomnetworks.co.ke;

        # Let's Encrypt Acmetool Challenge Path
        location /.well-known/acme-challenge/ {
            root /var/www/html;
            allow all;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # =========================================================================
    # HTTPS PRODUCTION PORTAL
    # =========================================================================
    server {
        listen 443 ssl;
        listen [::]:443 ssl;
        http2 on; # Enable HTTP/2 for high performance stream multiplexing
        server_name erp.celcomnetworks.co.ke;

        # SSL Certificates (Managed via Certbot)
        ssl_certificate /etc/letsencrypt/live/erp.celcomnetworks.co.ke/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/erp.celcomnetworks.co.ke/privkey.pem;

        # TLS Protocols & Cipher Suites Hardening (A+ Security Rating)
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;
        ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384';

        # Session Tracking Optimizations
        ssl_session_timeout 1d;
        ssl_session_cache shared:SSL:10m;
        ssl_session_tickets off;

        # OCSP Stapling (Validate TLS cert in real-time)
        ssl_stapling on;
        ssl_stapling_verify on;
        resolver 8.8.8.8 1.1.1.1 valid=300s;
        resolver_timeout 5s;

        # Strict Security Headers
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' data: https://fonts.gstatic.com; img-src 'self' data: blob: referrer; connect-src 'self' wss: https:;" always;

        # Reverse Proxy Configuration for Core ERP App
        location / {
            limit_req zone=global_limit burst=50 nodelay;

            proxy_pass http://celcom_erp_backend;
            proxy_http_version 1.1;

            # Keep connection alive for optimal latency performance
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $server_port;

            # Buffer Adjustments for Fast Enterprise Delivery
            proxy_buffers 16 16k;
            proxy_buffer_size 32k;
            proxy_busy_buffers_size 64k;
            proxy_temp_file_write_size 64k;
            proxy_connect_timeout 90;
            proxy_send_timeout 90;
            proxy_read_timeout 90;
        }

        # Stricter Rate Limiting on Login and Authenticating Paths
        location /api/v1/auth/login {
            limit_req zone=auth_limit burst=10 nodelay;

            proxy_pass http://celcom_erp_backend;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Static Assets Caching Optimization (Vite Asset Builds)
        location /assets/ {
            proxy_pass http://celcom_erp_backend;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;

            # Strong Client Caching Rules (Assets are cache-busted by hash names)
            expires 1y;
            add_header Cache-Control "public, no-transform, immutable";
            access_log off;
        }

        # Custom Health Check Proxy Path
        location /health {
            proxy_pass http://celcom_erp_backend/api/health;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            access_log off;
        }
    }
}
