# =========================================================================
# CELCOM ERP PRO - PRODUCTION LOG ROTATION SPECIFICATION
# Setup: Copy this file to /etc/logrotate.d/celcom-erp-pro
# =========================================================================

# 1. NGINX Server Access & Error Logs
/var/log/nginx/*.log {
    daily
    missingok
    rotate 30
    compress
    delaycompress
    notifempty
    create 0640 nginx adm
    sharedscripts
    postrotate
        if [ -f /var/run/nginx.pid ]; then
            kill -USR1 `cat /var/run/nginx.pid`
        fi
    endscript
}

# 2. PM2 Node Process Logs
/opt/celcom-erp-pro/logs/*.log {
    daily
    missingok
    rotate 14
    compress
    delaycompress
    notifempty
    create 0660 node adm
    copytruncate
}

# 3. Docker Container Logs (Fallback System Rotation)
/var/lib/docker/containers/*/*.log {
    size 10M
    rotate 5
    compress
    delaycompress
    missingok
    notifempty
    copytruncate
}
